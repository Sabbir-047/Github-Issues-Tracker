<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind and daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- custom css -->
    <link rel="stylesheet" href="styles.css">


    <style>
        .color-primary {
            color: #1F2937;
        }

        .color-secondary {
            color: #64748B;
        }
    </style>

    <title>Github Issues Tracker</title>
</head>

<body>

    <!-- navbar -->
    <header class="bg-white  shadow">
        <nav class="flex flex-col lg:flex-row justify-between items-center max-w-11/12 mx-auto py-4">
            <div class="flex justify-between items-center gap-2 pb-4">
                <img class="w-9 h-9" src="assets/github-logo.png" alt="github-logo">
                <h2 class="color-primary font-semibold text-2xl">Github Issues Tracker</h2>
            </div>
            <div class="flex justify-between items-center gap-4">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search Issues" />
                </label>
                <button class="btn btn-primary text-white text-lg font-semibold">+ New Issue</button>
            </div>
        </nav>
    </header>

    <!-- github issues -->
    <main class="bg-[#F8FAFC]">
        <section class="max-w-4/5 mx-auto py-16 space-y-4 rounded-lg">
            <!-- Buttons section -->
            <div id="btnContainer" class="p-6 bg-white">
                <button id="allBtn" class="btn">All</button>
                <button id="openBtn" class="btn btn-outline">Open</button>
                <button id="closedBtn" class="btn btn-outline">Closed</button>
            </div>

            <!-- total issues section -->
            <div
                class="p-6 bg-white rounded-lg flex flex-col md:flex-row space-y-4 md:space-y-0 justify-between items-center">
                <div class="flex gap-4 items-center">
                    <img class="w-7 h-7" src="assets/Aperture.png" alt="Aperture">
                    <div>
                        <h3 id="issueTracker" class="color-primary text-xl font-semibold">50 Issues</h3>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div>🟢 Open</div>
                    <div>🟣 Closed</div>
                </div>
            </div>

            <!-- issue card section -->
            <div id="cardContainer" class="bg-[#FBFBFB] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 p-6">
                <!-- issues -->
            </div>
        </section>
    </main>

    <footer>

    </footer>


    <script src="scripts/login.js"></script>
    <script src="scripts/script.js"></script>
</body>

</html>
