<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind and daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- custom css -->
    <link rel="stylesheet" href="styles.css">

    <style>
        .color-primary {
            color: #1F2937;
        }

        .color-secondary {
            color: #64748B;
        }
    </style>

    <title>Github Issues Tracker</title>
</head>

<body>

    <header>
        <!-- code will be here -->
    </header>

    <main class="bg-[#F8FAFC] py-20">
        <section class="container max-w-lg max-h-screen mx-auto p-8 bg-white rounded-lg">
            <div class="flex justify-center items-center flex-col">
                <img src="assets/github-logo.png" alt="github-logo" class="max-w-24 pb-6">
                <h2 class="text-2xl font-semibold color-primary pb-1">Github Issues Tracker</h2>
                <p class="color-secondary">Sign in to manage your issues</p>
            </div>

            <div class="py-6">
                <fieldset class="fieldset">
                    <label class="label color-primary text-lg">Username</label>
                    <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
                    <label class="text-violet-800 pb-4">Default: admin</label>
                    <label class="label color-primary text-lg">Password</label>
                    <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                    <label class="text-violet-800">Default: admin123</label>
                    <button id="btn-signin" class="btn btn-primary mt-4">Sign In</button>
                </fieldset>
            </div>
            <div>
                <div class="grid grid-cols-12 items-center">
                    <div class="col-span-5">
                        <hr class="text-gray-300">
                    </div>
                    <div class="col-span-2">
                        <p class="text-center">OR</p>
                    </div>
                    <div class="col-span-5">
                        <hr class="text-gray-300">
                    </div>
                </div>

                <div class="py-6 text-center">
                    <p class="color-secondary text-sm pb-2">Demo Credentials:</p>

                    <div class="p-6 bg-[#F8FAFC] rounded-lg">
                        <p class="color-primary font-bold">Username: <span class="color-secondary">admin</span></p>
                        <p class="color-primary font-bold">Password: <span class="color-secondary">admin123</span></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <!-- code will be here -->
    </footer>


    <script src="scripts/login.js"></script>
    <script src="scripts/script.js"></script>
</body>

</html>
